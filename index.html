<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多树形结构 · 节点交织模型</title>
<!--
  轻壳:页面只保留启动提示与危险光晕两个前置元素。
  样式按组件拆在 styles/,数据·故事·场景·UI·编排拆在 src/(入口 src/main.js,UI 组件自行挂载 DOM)。
  修改后运行 node build-embedded.mjs 重新生成单文件版 index-embedded.html。
-->
<link rel="stylesheet" href="./styles/base.css">
<link rel="stylesheet" href="./styles/topbar.css">
<link rel="stylesheet" href="./styles/panel.css">
<link rel="stylesheet" href="./styles/hud.css">
<link rel="stylesheet" href="./styles/tooltip.css">
<link rel="stylesheet" href="./styles/labels.css">
<link rel="stylesheet" href="./styles/viewport.css">
</head>
<body>
<div id="boot">正在加载 3D 引擎…</div>
<div id="vignette"></div>

<script>
window.__bootTimer=setTimeout(function(){
  var b=document.getElementById('boot');
  if(b&&!window.__booted){b.textContent='three.js 加载失败 —— 若是直接双击打开本文件，浏览器会拦截本地模块加载：请改用 index-embedded.html（可双击），或用本地服务器打开（见 README）';}
},9000);
window.addEventListener('error',function(e){
  (window.__errs=window.__errs||[]).push((e.message||'资源加载失败')+' @ '+(e.filename||'')+':'+(e.lineno||''));
  var b=document.getElementById('boot');
  if(b&&!window.__booted){b.textContent='3D 引擎加载出错：'+(e.message||'资源加载失败')+' —— 请检查后刷新';clearTimeout(window.__bootTimer);}
},true);
window.addEventListener('unhandledrejection',function(e){
  (window.__errs=window.__errs||[]).push('Promise: '+(e.reason&&e.reason.message||e.reason));
});
</script>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/": "./vendor/"
  }
}
</script>

<script type="module" src="./src/main.js"></script>
</body>
</html>
