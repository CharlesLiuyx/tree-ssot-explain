<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多树形结构 · 节点交织模型</title>
<style>
  :root{
    --gold:#ffd166; --red:#ff4d6d; --green:#5dd39e; --amber:#ffb84d; --mg:#ff2fd0; --ghost:#7de8ff;
    --txt:#dfe6f3; --sub:#93a0b8; --card:rgba(13,17,26,.82); --line:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(1200px 800px at 50% 30%,#141b2a 0%,#0a0e16 55%,#06080d 100%);
    color:var(--txt);font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,-apple-system,sans-serif;font-size:14px}
  canvas{display:block}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sub);z-index:99;
    background:rgba(6,8,13,.7);font-size:15px;letter-spacing:.05em;text-align:center;padding:0 40px;line-height:1.8}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:5;transition:box-shadow .8s}
  #vignette.danger{box-shadow:inset 0 0 200px rgba(255,60,90,.30);animation:vpulse 1.6s ease-in-out infinite}
  @keyframes vpulse{50%{box-shadow:inset 0 0 260px rgba(255,60,90,.45)}}

  #topbar{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
    padding:14px 22px;display:flex;justify-content:space-between;align-items:baseline;
    background:linear-gradient(180deg,rgba(6,8,13,.85),transparent)}
  #topbar h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.06em}
  #topbar h1 em{font-style:normal;color:var(--gold)}
  #topbar .sub{color:var(--sub);font-size:12px;margin-top:2px}
  #topbar .keys{color:var(--sub);font-size:12px}
  #topbar .keys b{color:var(--txt);font-weight:600}

  #panel{position:fixed;left:18px;top:72px;z-index:10;width:408px;max-height:calc(100vh - 170px);
    overflow-y:auto;background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:14px;padding:16px 18px 14px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  #panel::-webkit-scrollbar{width:6px}
  #panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
  #stage-chip{display:inline-block;font-size:11px;letter-spacing:.18em;color:var(--gold);
    border:1px solid rgba(255,209,102,.4);border-radius:99px;padding:2px 10px;margin-bottom:8px}
  #stage-title{margin:0 0 8px;font-size:19px;font-weight:700;line-height:1.35}
  #stage-body{color:var(--txt);line-height:1.8;font-size:13.5px}
  #stage-body p{margin:.5em 0}
  #stage-body ul{margin:.4em 0;padding-left:1.2em}
  #stage-body li{margin:.3em 0}
  .g{color:var(--gold);font-weight:600}.r{color:var(--red);font-weight:600}
  .gr{color:var(--green);font-weight:600}.am{color:var(--amber);font-weight:600}
  .mg{color:var(--mg);font-weight:600}.gh{color:var(--ghost);font-weight:600}
  .dim{color:var(--sub)}
  .hint{margin-top:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.05);
    color:var(--sub);font-size:12.5px;line-height:1.6}
  .hint b{color:var(--txt)}
  .formula{margin:10px 0;padding:12px;border-radius:10px;text-align:center;font-size:14.5px;font-weight:600;
    background:linear-gradient(135deg,rgba(255,209,102,.12),rgba(255,209,102,.04));border:1px solid rgba(255,209,102,.35)}
  .quote{margin-top:10px;padding:10px 12px;border-left:3px solid var(--gold);background:rgba(255,255,255,.04);
    border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.75}

  #case-box{display:none;margin-top:10px;padding:10px 12px;border-left:3px solid var(--red);
    background:rgba(255,77,109,.08);border-radius:0 8px 8px 0;font-size:12.8px;line-height:1.7;min-height:64px}
  #case-box b{color:var(--red)}

  #strategies{display:none;margin-top:12px}
  .strat{display:block;width:100%;text-align:left;margin:6px 0;padding:9px 12px;border-radius:10px;cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--txt);font-family:inherit;transition:all .25s}
  .strat:hover{border-color:rgba(255,209,102,.5)}
  .strat.on{background:linear-gradient(135deg,rgba(255,209,102,.16),rgba(255,209,102,.05));border-color:var(--gold)}
  .strat .s-name{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700}
  .strat .s-name em{font-style:normal;color:var(--green);font-weight:700}
  .strat.on .s-name::before{content:"✓ ";color:var(--gold)}
  .strat .s-desc{display:block;margin-top:3px;color:var(--sub);font-size:12px;line-height:1.6}
  .strat .s-desc b{color:var(--mg)}
  .strat .s-desc i{font-style:normal;color:var(--ghost)}
  .strat[disabled]{pointer-events:none;opacity:.9}
  #tangle-stats{margin-top:8px;font-size:12.5px;color:var(--sub);line-height:1.7}

  #nav{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  #nav button{cursor:pointer;border:none;border-radius:9px;padding:8px 16px;font-family:inherit;font-size:13.5px;font-weight:600}
  #prev{background:rgba(255,255,255,.08);color:var(--txt)}
  #prev:hover{background:rgba(255,255,255,.14)}
  #next{background:var(--gold);color:#1a1408;flex:1}
  #next:hover{filter:brightness(1.1)}
  #dots{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;
    background:var(--card);border:1px solid var(--line);border-radius:99px;padding:8px 12px;backdrop-filter:blur(14px)}
  .dot{cursor:pointer;color:var(--sub);font-size:12px;padding:3px 8px;border-radius:99px;transition:all .2s;white-space:nowrap}
  .dot:hover{color:var(--txt)}
  .dot.cur{background:rgba(255,209,102,.18);color:var(--gold);font-weight:700}

  #meter{position:fixed;right:18px;top:72px;z-index:10;width:252px;background:var(--card);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  #meter .m-title{font-size:12px;color:var(--sub);letter-spacing:.1em}
  #meter .m-row{display:flex;align-items:baseline;gap:8px;margin:2px 0 8px}
  #entropy-val{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums}
  #entropy-zone{font-size:12.5px;font-weight:700}
  #meter .bar{height:9px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
  #meter .bar i{position:absolute;top:-2px;bottom:-2px;width:1px;background:rgba(255,255,255,.25)}
  #entropy-fill{height:100%;width:0%;border-radius:99px;transition:background .5s}
  #meter .zones{display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;color:var(--sub)}
  .z-ok{color:var(--green)} .z-mid{color:var(--amber)} .z-bad{color:var(--red)}

  #legend{position:fixed;right:18px;bottom:16px;z-index:10;background:var(--card);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:11.5px;color:var(--sub);line-height:1.9}
  #legend .sw{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:6px;vertical-align:baseline}

  #tooltip{position:fixed;z-index:20;pointer-events:none;display:none;max-width:330px;
    background:rgba(10,13,20,.94);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 12px;
    font-size:12.5px;line-height:1.65;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  #tooltip b{font-size:13.5px}
  #tooltip .tt-kind{display:block;color:var(--sub);font-size:11.5px;margin:1px 0 4px}
  #tooltip .tt-mean{color:var(--amber);font-weight:600;margin-bottom:2px}
  #tooltip .tt-grav{color:var(--mg);font-weight:600;margin-top:4px}
  #tooltip .tt-ghost{color:var(--ghost);font-weight:600;margin-top:4px}
  #tooltip ul{margin:2px 0 0;padding-left:1.1em;color:var(--sub)}
  #tooltip li{margin:2px 0}
  #tooltip li b{color:var(--txt);font-size:12.5px}
  #tooltip .tt-desc{color:var(--txt);margin-top:2px}

  .term{border-bottom:1px dotted rgba(223,230,243,.45);cursor:help}
  .term:hover{border-bottom-style:solid;border-bottom-color:var(--gold)}

  .tlabel{pointer-events:none;text-align:center;color:var(--txt);text-shadow:0 2px 8px rgba(0,0,0,.9);transition:opacity .5s}
  .tlabel b{display:block;font-size:14px;letter-spacing:.05em}
  .tlabel .ssot{display:block;font-size:10.5px;color:var(--gold);letter-spacing:.12em}
  .tlabel i{display:none;font-style:normal;font-size:11px;color:var(--sub);line-height:1.5;margin-top:3px;max-width:220px}
  .tlabel.full i{display:block}
  .tlabel.ghost{opacity:.12}
  .plabel b{color:#f3e9c8}
  .ailabel{pointer-events:none;text-align:center;color:#cfe0ff;text-shadow:0 2px 8px rgba(0,0,0,.9);font-size:12.5px;font-weight:700}
  .ailabel span{display:block;font-size:10.5px;color:var(--sub);font-weight:400}
  .glabel{pointer-events:none;text-align:center;color:var(--ghost);text-shadow:0 2px 8px rgba(0,0,0,.9);font-size:12px;font-weight:600}
  .glabel b{display:block;font-size:12.5px}
  .glabel span{display:block;font-size:10px;color:var(--sub);font-weight:400}

  @media (max-width:980px){
    #panel{width:min(86vw,408px)}
    #meter{width:200px}
    #dots{max-width:92vw;overflow-x:auto}
  }
</style>
</head>
<body>
<div id="boot">正在加载 3D 引擎…</div>
<div id="vignette"></div>

<header id="topbar">
  <div>
    <h1>多树形结构 · <em>节点交织</em>模型</h1>
    <div class="sub">Multi-Tree / Node-Entanglement Model —— 为什么项目复杂到某一刻，AI 突然就「糊」了</div>
  </div>
  <div class="keys">拖动旋转 · 滚轮缩放 · <b>←/→</b> 切换步骤 · 悬停节点 / 红线 / 引力束 / 幽灵根看详情</div>
</header>

<aside id="panel">
  <span id="stage-chip"></span>
  <h2 id="stage-title"></h2>
  <div id="stage-body"></div>
  <div id="case-box"></div>
  <div id="strategies">
    <div id="strat-list"></div>
    <div id="tangle-stats"></div>
  </div>
  <div id="nav">
    <button id="prev">← 上一步</button>
    <button id="next">下一步 →</button>
  </div>
</aside>

<div id="meter">
  <div class="m-title">语义熵 · AI 混淆度</div>
  <div class="m-row"><span id="entropy-val">0%</span><span id="entropy-zone"></span></div>
  <div class="bar"><div id="entropy-fill"></div><i style="left:30%"></i><i style="left:65%"></i></div>
  <div class="zones"><span class="z-ok">可驾驭</span><span class="z-mid">吃力·需人在环</span><span class="z-bad">崩塌区</span></div>
</div>

<div id="legend">
  <span class="sw" style="background:#ffd166"></span>根 / SSOT —— 由人守护<br>
  <span class="sw" style="background:#d9e650"></span><span class="sw" style="background:#ff7fb2;margin-left:-3px"></span>业务树（深）　<span class="sw" style="background:#5b8cff"></span>横切树（拉通）<br>
  <span class="sw" style="background:#ff4d6d"></span>偶然交织（可消解）　<span class="sw" style="background:#ff2fd0"></span>本征引力（只能共域）<br>
  <span class="sw" style="background:#7de8ff"></span>幽灵根 —— 真相在图外（只能显式化收编）<br>
  <span class="sw" style="background:transparent;border:1.5px dashed #7de8ff"></span>仓库边界（可嵌套）—— 每棵树可自成仓库 / 子仓库<br>
  <span class="sw" style="background:transparent;border:1.5px solid #5dd39e"></span>叶子 · AI 自由区　<span class="sw" style="background:#ffb84d"></span>已契约化　<span class="sw" style="background:#f3e9c8"></span>平台树
</div>

<div id="dots"></div>

<div id="tooltip"></div>

<script>
window.__bootTimer=setTimeout(function(){
  var b=document.getElementById('boot');
  if(b&&!window.__booted){b.textContent='three.js 加载失败 —— 若是直接双击打开本文件，浏览器会拦截本地模块加载：请改用 index-embedded.html（可双击），或用本地服务器打开（见 README）';}
},9000);
window.addEventListener('error',function(e){
  (window.__errs=window.__errs||[]).push((e.message||'资源加载失败')+' @ '+(e.filename||'')+':'+(e.lineno||''));
  var b=document.getElementById('boot');
  if(b&&!window.__booted){b.textContent='3D 引擎加载出错：'+(e.message||'资源加载失败')+' —— 请检查后刷新';clearTimeout(window.__bootTimer);}
},true);
window.addEventListener('unhandledrejection',function(e){
  (window.__errs=window.__errs||[]).push('Promise: '+(e.reason&&e.reason.message||e.reason));
});
</script>

/* ============================== 工具 ============================== */
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng=mulberry32(42);
const easeIO=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const UP=V3(0,1,0);
const _v1=new THREE.Vector3(), _v2=new THREE.Vector3(), _v3=new THREE.Vector3(), _v4=new THREE.Vector3();

const tweens=new Set();
function tween(dur,update,done){
  const tw={t0:performance.now(),dur:dur*1000,update,done};
  tweens.add(tw); return tw;
}
function stepTweens(){
  const now=performance.now();
  for(const tw of [...tweens]){
    const k=Math.min(1,(now-tw.t0)/tw.dur);
    tw.update(easeIO(k));
    if(k>=1){tweens.delete(tw); tw.done&&tw.done();}
  }
}
function tweenVec(v,to,dur,onUpdate,onDone){
  const from=v.clone(), tgt=to.clone?to.clone():V3(to[0],to[1],to[2]);
  return tween(dur,k=>{v.lerpVectors(from,tgt,k); onUpdate&&onUpdate();},onDone);
}
let camTweenA=null,camTweenB=null;
function flyCamera(pos,tgt,dur=1.6){
  if(camTweenA)tweens.delete(camTweenA); if(camTweenB)tweens.delete(camTweenB);
  // 窄视口（竖屏/分栏）时把相机按比例推远，避免两侧的树被裁掉
  const k=camera.aspect<1.45?Math.min(1.8,1.45/camera.aspect):1;
  const p=tgt.clone().add(pos.clone().sub(tgt).multiplyScalar(k));
  camTweenA=tweenVec(camera.position,p,dur);
  camTweenB=tweenVec(controls.target,tgt,dur);
}
// 单位长度圆柱 + scale.y 拉伸，便于每帧更新（引力形变时枝干跟着拉长）
function makeCylinder(r,mat){
  return new THREE.Mesh(new THREE.CylinderGeometry(r,r,1,6,1,true),mat);
}
function setCylinder(mesh,a,b){
  const d=_v1.copy(b).sub(a), len=Math.max(.001,d.length());
  mesh.position.copy(a).addScaledVector(d,.5);
  mesh.quaternion.setFromUnitVectors(UP,d.normalize());
  mesh.scale.set(1,len,1);
}
function disposeGroup(g){
  for(const c of [...g.children]){
    g.remove(c);
    c.traverse(o=>{if(o.geometry)o.geometry.dispose(); if(o.material)o.material.dispose&&o.material.dispose();});
  }
}

/* ============================== 建树 ============================== */
const nodesById=new Map();
const trees=[];
const allNodes=[];
const spinners=[];   // {obj,axis,speed}
const pulses=[];     // SDD 脉冲 {dot,e,phase}
const rootRings=[];  // SDD 根环
const labelEls=[];

// 两种体型：业务树（biz）更高、可长到 5 层；横切树（cross）浅而拉通
const LVL={
  biz:  {Y:[19,13.6,8.8,4.2,1.0], R:[0,5.2,9.4,11.6,12.6], S:[1.05,.7,.53,.42,.33]},
  cross:{Y:[15,9.8,4.9,.9],       R:[0,4.6,8.8,12.2],      S:[1.05,.68,.5,.4]},
};
const lvlOf=(kind,level)=>{
  const t=LVL[kind]||LVL.cross, i=Math.min(level,t.Y.length-1);
  return {y:t.Y[i], r:t.R[i], s:t.S[i]};
};

function addNode(tree,gid,name,level,pos,hasChildren){
  const size=lvlOf(tree.def.kind,level).s;
  const color=level===0?GOLD:tree.def.color;
  const mat=new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.38,roughness:.35,metalness:.15,transparent:true,opacity:1});
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,24,18),mat);
  mesh.position.copy(pos);
  const node={gid,name,level,tree:tree.idx,mesh,mat,base:color,tangles:[],halos:[],rim:null,shell:null,
    gravity:null, ghost:null, anchor:pos.clone(), hasChildren};
  mesh.userData.node=node;
  tree.group.add(mesh);
  if(level===0){
    const rim=new THREE.Mesh(new THREE.SphereGeometry(size*1.45,14,10),
      new THREE.MeshBasicMaterial({color:GOLD,wireframe:true,transparent:true,opacity:.4}));
    mesh.add(rim); node.rim=rim;
    spinners.push({obj:rim,axis:V3(0,1,0),speed:.25});
  }else if(!hasChildren){
    // 叶子：绿描边（AI 自由区）+ TDD 护栏壳
    const rim=new THREE.Mesh(new THREE.SphereGeometry(size*1.42,12,9),
      new THREE.MeshBasicMaterial({color:GREEN,wireframe:true,transparent:true,opacity:.24}));
    mesh.add(rim); node.rim=rim;
    const shell=new THREE.Mesh(new THREE.IcosahedronGeometry(size*1.95,1),
      new THREE.MeshBasicMaterial({color:GREEN,wireframe:true,transparent:true,opacity:.5}));
    shell.visible=false; mesh.add(shell); node.shell=shell;
    spinners.push({obj:shell,axis:V3(rng()-.5,1,rng()-.5).normalize(),speed:.35});
  }
  nodesById.set(gid,node); allNodes.push(node); tree.nodes.push(node);
  return node;
}
function makeEdge(tree,na,nb){
  const mesh=makeCylinder(.055,tree.edgeMat);
  setCylinder(mesh,na.mesh.position,nb.mesh.position);
  tree.group.add(mesh);
  const e={na,nb,mesh};
  tree.edges.push(e);
  return e;
}
function buildNodeRec(tree,def,level,angle,parent){
  const L=lvlOf(tree.def.kind,level);
  let pos;
  if(level===0) pos=V3(0,L.y,0);
  else{
    const y=L.y+(level>=2?(rng()*1.6-.8):0);
    const r=L.r+(level>=3?(rng()*1.6-.8):0); // 深层半径抖动：树冠更有机（幅度需保证冠幅 ≤ 树环半径）
    pos=V3(Math.cos(angle)*r,y,Math.sin(angle)*r);
  }
  const node=addNode(tree,tree.def.id+'.'+def.id,def.n,level,pos,!!(def.c&&def.c.length));
  if(parent)makeEdge(tree,parent,node);
  (def.c||[]).forEach((cd,i)=>{
    let a2;
    if(level===0) a2=-Math.PI/2+i*(Math.PI*2/def.c.length)+.42;
    else{
      const base=level===1?.62:.38;
      const spread=def.c.length>=3?base*.78:base; // 子分支多时收拢，避免与邻枝相撞
      a2=angle+(i-(def.c.length-1)/2)*spread;
    }
    buildNodeRec(tree,cd,level+1,a2,node);
  });
  return node;
}

TREE_DEFS.forEach((def,idx)=>{
  const group=new THREE.Group();
  group.position.set(...def.pos);
  scene.add(group);
  const edgeMat=new THREE.MeshBasicMaterial({color:def.color,transparent:true,opacity:.4});
  const tree={def,idx,group,nodes:[],edges:[],edgeMat};
  trees.push(tree);
  buildNodeRec(tree,{id:'root',n:def.rootName,c:def.l1},0,0,null);

  // SDD 脉冲点（沿树边流动，端点取节点实时位置——引力形变时自动跟随）
  tree.edges.forEach(e=>{
    const dot=new THREE.Mesh(new THREE.SphereGeometry(.14,8,6),
      new THREE.MeshBasicMaterial({color:GOLD,transparent:true,opacity:.95,blending:THREE.AdditiveBlending,depthWrite:false}));
    dot.visible=false; group.add(dot);
    pulses.push({dot,e,phase:rng()});
  });

function updateGravity(time){
  const fuseTarget=stratOn('fusion')?1:0;
  fuseBlend+=(fuseTarget-fuseBlend)*.06;
  const applied=gravityPull*(.72+.26*fuseBlend);
  const beamOn=gravityPull>.03;
  for(const g of GRAVITY){
    const ga=trees[g.na.tree].group, gb=trees[g.nb.tree].group;
    // 树组只有平移，无需矩阵：world = local + group.position
    _v2.copy(g.na.anchor).add(ga.position);
    _v3.copy(g.nb.anchor).add(gb.position);
    _v4.copy(_v2).add(_v3).multiplyScalar(.5); // 引力中点
    _v2.lerp(_v4,applied); _v3.lerp(_v4,applied);
    g.na.mesh.position.copy(_v2).sub(ga.position);
    g.nb.mesh.position.copy(_v3).sub(gb.position);
    g.beam.visible=beamOn;
    if(beamOn){
      setCylinder(g.beam,_v2,_v3);
      const dimmed=state.stage===6; // 崩塌阶段聚焦红色纠缠，引力束退后
      g.beam.material.color.setHex(fuseBlend>.5?GOLD:MAGENTA);
      g.beam.material.opacity=dimmed?.07:(fuseBlend>.5?.3:.38+.18*Math.sin(time*3+g.idx*1.7));
      g.parts.forEach((dot,p)=>{
        const show=beamOn&&!dimmed&&fuseBlend<.6;
        dot.visible=show;
        if(show){
          const k=(time*.45+p*.25+g.idx*.13)%1;
          dot.position.lerpVectors(p%2?_v2:_v3,_v4,k);
          dot.material.opacity=.85*(1-k*.6);
        }
      });
      const bub=fuseBlend>.03&&gravityPull>.4;
      g.bubble.visible=bub; g.bubbleWire.visible=bub;
      if(bub){
        g.bubble.position.copy(_v4); g.bubbleWire.position.copy(_v4);
        g.bubble.material.opacity=.09*fuseBlend;
        g.bubbleWire.material.opacity=.24*fuseBlend;
      }
    }else{
      g.parts.forEach(d=>d.visible=false);
      g.bubble.visible=false; g.bubbleWire.visible=false;
    }
  }
  // 引力节点牵动的枝干（被拉长的形变）
  for(const {e} of gravityEdges)setCylinder(e.mesh,e.na.mesh.position,e.nb.mesh.position);
}

let ghostCollect=0, ghostLayerK=1, ringScaleK=1;
function updateGhosts(t){
  const stage=state.stage;
  const show=stage===0||stage>=5;
  const faint=stage===0?.45:1;
  const dim=stage===6?.15:1;
  ghostCollect+=((stratOn('explicit')?1:0)-ghostCollect)*.05;
  ghostLayerK+=((stratOn('layer')?1.45:1)-ghostLayerK)*.05;
  ringScaleK+=((stratOn('layer')?1.62:1)-ringScaleK)*.05;
  boundaryRing.scale.setScalar(ringScaleK);
  const ringTarget=(show?1:0)*faint*dim*.32;
  boundaryRing.material.opacity+=(ringTarget-boundaryRing.material.opacity)*.06;
  boundaryRing.visible=boundaryRing.material.opacity>.01;
  bLab.visible=show&&stage>=5&&dim===1;
  bLab.position.set(0,2.4,49*ringScaleK);
  // 树环：分层开启时树被压进层间（墙与接口环接管边界感），树环随之淡出
  const layerBlend=Math.min(1,Math.max(0,(ringScaleK-1)/.62));
  const treeTarget=(show?1:0)*faint*dim*.42*(1-layerBlend);
  treeRingMat.opacity+=(treeTarget-treeRingMat.opacity)*.06;
  treeDiscMat.opacity+=(treeTarget*.18-treeDiscMat.opacity)*.06;
  const treeRingVis=treeRingMat.opacity>.01;
  for(const g of treeRings)g.visible=treeRingVis;
  trLab.visible=show&&stage>=5&&dim===1&&layerBlend<.5;
  for(const g of GHOSTS){
    g.blend+=((show?1:0)-g.blend)*.06;
    const on=g.blend>.02;
    g.wire.visible=on; g.inner.visible=on;
    g.label.visible=on&&g.blend>.5&&stage>=5&&dim===1;
    g.dashed.forEach(l=>l.visible=on); g.solid.forEach(l=>l.visible=on&&ghostCollect>.02);
    if(!on)continue;
    // 位置：游离在边界外 ←→（显式化后）被收编进边界内
    _v1.set(g.pos[0]*ghostLayerK,g.pos[1],g.pos[2]*ghostLayerK);
    _v2.set(g.pos[0]*ghostLayerK*.42,13,g.pos[2]*ghostLayerK*.42);
    _v1.lerp(_v2,ghostCollect);
    _v1.y+=Math.sin(t*.8+g.idx*1.9)*.9;
    g.wire.position.copy(_v1); g.inner.position.copy(_v1);
    const op=g.blend*faint*dim;
    const col=ghostCollect>.5?GOLD:GHOSTC;
    g.wire.material.color.setHex(col); g.inner.material.color.setHex(col);
    g.wire.material.opacity=(.42+.2*Math.sin(t*2.2+g.idx))*op+ghostCollect*.2*op;
    g.inner.material.opacity=.5*op;
    g.targets.forEach((n,i)=>{
      n.mesh.getWorldPosition(_v3).sub(ghostGroup.position);
      g.dashed[i].geometry.setFromPoints([_v1,_v3]);
      g.dashed[i].computeLineDistances();
      g.dashed[i].material.opacity=.5*op*(1-ghostCollect);
      g.solid[i].geometry.setFromPoints([_v1,_v3]);
      g.solid[i].material.opacity=.55*op*ghostCollect;
      // 被幽灵根牵住的节点：语义不稳定地闪烁；显式化后恢复安定
      if(stage>=5&&stage!==6&&ghostCollect<.5)
        n.mat.emissiveIntensity=.38+.5*Math.abs(Math.sin(t*5+g.idx*2+i*1.3));
      else if(hovered!==n.mesh)
        n.mat.emissiveIntensity=.38;
    });
  }
}

        const mid=p.clone().add(pn).multiplyScalar(.5); mid.y+=3.5;
        meshes.push(tubeMesh(new THREE.QuadraticBezierCurve3(p,mid,pn),.06,GOLD,.5));
      }
      tangleCounts.plat++;
    }else if(stratOn('layer')){
      const gates=WALL_XS.filter(x=>x>Math.min(pa.x,pb.x)&&x<Math.max(pa.x,pb.x))
        .sort((x,y)=>pa.x<pb.x?x-y:y-x).map(x=>V3(x,9,0));
      const curve=new THREE.CatmullRomCurve3([pa,...gates,pb],false,'catmullrom',.2);
      meshes.push(tubeMesh(curve,.08,AMBER,.55));
      tangleCounts.amber++;
    }else if(t.resolvedByLoops){
      const mid=pa.clone().add(pb).multiplyScalar(.5); mid.y+=4;
      meshes.push(tubeMesh(new THREE.QuadraticBezierCurve3(pa,mid,pb),.04,GREY,.22,false));
      tangleCounts.grey++;
    }else{
      const mid=pa.clone().add(pb).multiplyScalar(.5);
      mid.y+=5+pa.distanceTo(pb)*.1;
      let op=stage===0?.28:.6;
      if(stage===4) op=.22;      // 引力阶段：红线退后，突出洋红
      if(stage===5) op=.18;      // 图外真相阶段：红线退后，突出幽灵根
      if(stage===6) op=(t.aNode.gid===FOCUS_ID||t.bNode.gid===FOCUS_ID)?.9:.06;
      meshes.push(tubeMesh(new THREE.QuadraticBezierCurve3(pa,mid,pb),.11,RED,op));
      tangleCounts.red++;
    }
    for(const m of meshes){
      m.userData.tangle=t; tangleGroup.add(m); t.meshes.push(m); rayTubes.push(m);
    }
  }
  updateStats();

/* ============================== 节点外观 ============================== */
function nodeColor(n){
  if(n.level===0) return GOLD;
  if(n.gravity&&gravityPull>.4) return stratOn('fusion')?GOLD:MAGENTA;
  if(n.ghost&&state.stage>=5&&state.stage!==6&&!stratOn('explicit')) return GHOSTC;
  const revealed=n.tangles.filter(t=>t.revealedNow);
  if(!revealed.length) return n.base;
  if(stratOn('platform')) return GOLD;
  if(stratOn('layer')) return AMBER;
  return revealed.some(t=>!t.resolvedByLoops)?RED:GREY;
}
function refreshNodes(){
  const stage=state.stage;
  for(const n of allNodes){
    let op=1;
    if(stage===1&&n.tree!==0) op=.1;
    if(stage===6) op=FOCUS_SET.has(n.gid)?1:.13;
    const c=nodeColor(n);
    n.mat.color.setHex(c); n.mat.emissive.setHex(c);
    n.mat.opacity=op;
    if(n.rim) n.rim.visible=op>.5;
    const redState=c===RED;
    n.tangles.forEach((t,j)=>{
      const h=n.halos[j];
      h.visible=redState&&t.revealedNow&&!t.resolvedByLoops&&op>.5;
      const s=stratOn('sdd')?.6:1;
      h.scale.setScalar(s);
      h.material.opacity=stratOn('sdd')?.3:.55;
    });
    if(n.shell) n.shell.visible=stratOn('tdd')&&op>.5;
  }
  trees.forEach((tr,ti)=>{
    tr.edgeMat.opacity=(stage===1&&ti!==0)?.05:(stage===6?.07:.4);
    labelEls[ti].classList.toggle('ghost',stage===1&&ti!==0);
    labelEls[ti].classList.toggle('full',stage>=2);
  });
  rootRings.forEach(r=>r.visible=stratOn('sdd'));
}

/* ============================== 语义熵 ============================== */
let entropyTarget=0, entropyShown=-1;
function calcEntropy(){
  const s=state.stage;
  if(s===0) return 72;
  if(s===1) return 8;
  if(s===2) return 20;
  if(s===3) return 26+62*(state.revealed/TANGLES.length);
  if(s===4) return 88;
  if(s===5) return 94;
  if(s===6) return 100;
  let e=100;
  for(const [k,f] of Object.entries(STRAT_FACTORS)) if(state.strat[k]) e*=f;
  return e;
}
function updateEntropy(){entropyTarget=calcEntropy();}
function paintEntropy(){
  if(Math.abs(entropyTarget-((entropyShown<0)?0:entropyShown))<.15&&entropyShown>=0) return;
  entropyShown=(entropyShown<0)?entropyTarget:entropyShown+(entropyTarget-entropyShown)*.06;
  const v=Math.round(entropyShown);
  const fill=document.getElementById('entropy-fill');
  const zone=document.getElementById('entropy-zone');
  const val=document.getElementById('entropy-val');
  val.textContent=v+'%';
  fill.style.width=Math.max(2,entropyShown)+'%';
  let txt,color;
  if(entropyShown<30){txt='AI 可驾驭';color='#5dd39e';}
  else if(entropyShown<65){txt='吃力 · 需人在环';color='#ffb84d';}
  else{txt='混淆崩塌区';color='#ff4d6d';}
  zone.textContent=txt; zone.style.color=color; val.style.color=color;
  fill.style.background=`linear-gradient(90deg,#5dd39e,${entropyShown<30?'#5dd39e':entropyShown<65?'#ffb84d':'#ff4d6d'})`;
}

function updateStats(){
  const el=document.getElementById('tangle-stats');
  if(state.stage<7){el.textContent='';return;}
  const {red,amber,grey,plat}=tangleCounts;
  el.innerHTML=
    `偶然交织：<span class="r">${red} 条仍在纠缠</span> · <span class="am">${amber} 条已契约化</span> · <span class="dim">${grey} 条循环中消解</span> · <span class="g">${plat} 条已平台化</span><br>`+
    `本征引力：${state.strat.fusion?`<span class="g">${GRAVITY.length} 对已共域（金色气泡）</span>`:`<span class="mg">${GRAVITY.length} 对仍在拉扯</span>`}<br>`+
    `图外真相：${state.strat.explicit?`<span class="g">${GHOSTS.length} 个幽灵根已收编入库</span>`:`<span class="gh">${GHOSTS.length} 个幽灵根游离在外</span>`}`;
  annotateTerms(el);
}

/* ============================== 树的位置（分层排布） ============================== */
function applyTreePositions(){
  const layered=stratOn('layer');
  trees.forEach(tr=>{
    const tgt=layered?V3(tr.def.layerX,0,0):V3(...tr.def.pos);
    if(tr.group.position.distanceTo(tgt)>.05){
      tweenVec(tr.group.position,tgt,1.3,()=>{linkDirty=true;},()=>{linkDirty=true;});
    }
  });
  const ptgt=layered?V3(0,0,-26):V3(0,0,-8);
  if(platformGroup.position.distanceTo(ptgt)>.05){
    tweenVec(platformGroup.position,ptgt,1.3,()=>{linkDirty=true;},()=>{linkDirty=true;});
  }
}

  <li><b>分清两种耦合</b>：<span class="r">偶然交织</span>，动手消解（平台化、分层、限速）；<span class="mg">本征引力</span>，坦然<span class="g">共域</span>（放进同一个模块，一起设计，同一个 owner）；</li>
  <li><b>让真相住在图内</b>：凡是 AI 读遍代码也答不出的问题（运行时装配、订阅关系、旧文件、环境配置），都要<span class="gh">显式化</span>收编回仓库——否则 AI 会把文本改「对」，把世界改坏；</li>
  <li><b>持续治理交织</b>：显式化、限速、分区、定期清理——但别把力气浪费在拆那些本来就拆不开的东西上。</li>
  </ul>
  <div class="quote">复杂度不能被消灭，只能被<b>安置</b>。<br>好的工程体系，把多义性安置在 attention 预算之内，把真相安置在仓库边界之内——<br>并且分得清：哪些距离可以拉开，哪些距离本来就不存在。</div>`},
];
const DOT_NAMES=['总览','一棵树','多棵树','交织','引力','图外真相','崩塌','消解','法则'];

/* ============================== 名词解释（悬停词条弹出） ============================== */
const TERMS={};
function defTerm(names,en,d){for(const n of names.split('|'))TERMS[n]={en,d};}
// —— 模型自造的概念 ——
defTerm('SSOT|单一事实源|事实源','Single Source of Truth','一条信息只有一个权威出处，其他地方都引用它，而不是各存一份。树根就是这个视角下所有决策的最终依据——根一乱，整棵树跟着乱。');
defTerm('横切树|横切关注点|横切','cross-cutting','「横切」指那些不属于任何单个业务模块、却对所有模块都生效的要求——性能、权限、发布控制都是。它们像钢筋一样横穿整个项目，每个模块都得配合。');
defTerm('业务树','domain tree','直接承载产品功能的模块体系，比如编辑器的数据模型、界面交互。它的深和密来自问题本身的难度，不是设计失误。');
defTerm('域复杂度','domain complexity','问题领域固有的复杂度：3D 软件必须处理场景层级和依赖更新，这部分难度换谁来做都省不掉——它正是产品价值所在。');
defTerm('偶然交织','accidental coupling','两个本不相干的模块，因为某个需求恰好同时用到，被绑在了一起。换一种设计就能解开——这是它与本征耦合最关键的区别。');
defTerm('本征耦合|本征引力','essential coupling','问题本身决定了两个模块必须一起变化——比如「命令」与「撤销」。再好的设计也拆不开，唯一的出路是承认它、放在一起管理。');
defTerm('幽灵根','ghost root','本模型的比喻：节点真正的事实源漂在仓库之外——运行时装配、用户磁盘上的旧文件、部署环境的配置。AI 把代码读穿也看不到它。');
defTerm('图外真相','truth outside the repo','决定代码行为的关键信息不在代码文本里，只存在于运行时、外部系统或用户数据中。静态阅读永远补不上这一块，这正是它比普通耦合更危险的地方。');
defTerm('仓库边界','repository boundary','青色圆环：环内是 AI 能静态读到的全部文本。边界是嵌套的——大环圈住整个工作区，每棵树也可以有自己的小环（自成仓库）。幽灵根的判据对任何一级边界都成立：只靠环内文本，能否答出运行时的真相。');
defTerm('子仓库|拆仓','sub-repository','大仓库里相对独立的一块——monorepo 的子包、git 的子模块都算。有自己的根、自己的边界，可以单独构建与测试；代价是跨出边界的每条依赖，都必须走显式契约，否则就沦为图外真相。');
defTerm('attention 预算|Attention 预算','attention budget','AI 一次能同时「记住并权衡」的信息量是有限的，像一张固定大小的工作台。要摊开的东西一旦超过台面，就会开始出错。');
defTerm('语义熵','semantic entropy · 本演示自造的指标','衡量「同一个名字平均背负多少个含义」的混乱度。交织越密、真相越飘在图外，熵越高，AI 理解错的概率越大。');
defTerm('多义性|多义词','polysemy','一个名字同时承担多个含义。就像「苹果」既是水果也是公司，读的人必须靠上下文猜它此刻指哪个——被多棵树引用的节点，就是代码里的多义词。');
defTerm('消歧','disambiguation','从多个可能的含义里确定当前指的是哪一个。含义越多、线索越散，消歧的成本越高；一旦超过 attention 预算，就会失败。');
defTerm('结构显式度','structural explicitness','结构信息有多少是「写明了」的：依赖看得见、装配读得到、约定有文档。显式度越高，AI 需要靠猜的就越少。');
defTerm('拉通','','让一件事贯穿所有模块、强行对齐——权限要管住每个角落、性能要快在每条路径上，这类要求天然是「拉通」的。');
// —— 七种手术 ——
defTerm('分层','layering','把系统按职责切成上下层，跨层只能走公开接口。层内可以乱，层间必须守约——代价是每穿一层都多一道手续。');
defTerm('SDD','Spec-Driven Development · 规格驱动开发','先把「应该做什么」写成明确的规格（spec），再让代码去实现。任何节点的含义都能从 spec 推导出来，AI 不必读遍代码去猜。');
defTerm('spec|Spec','specification · 规格说明','对「这段代码应该做什么」的明确书面约定。有了它，含义的出处就集中在根部，而不是散落在实现细节里。');
defTerm('TDD|测试锚定','Test-Driven Development · 测试驱动开发','先写测试、再写实现。测试是行为的锚：无论谁来改代码（包括 AI），只要改坏了原有行为，测试立刻报警。');
defTerm('Loops|小步循环','short loops · 小步迭代','小步快跑的节奏：每轮只做一小步，轮末回顾并清理这一轮新长出的混乱，不让纠缠悄悄堆积过夜。');
defTerm('平台化','platformization','把大家都需要的横切能力（权限、门控、审计）抽成独立的公共服务，各模块统一调用它——从「人人自己实现一份」变成「都依赖同一个根」。');
defTerm('共域','fusion · co-location','本模型的处方：承认两个模块拆不开，干脆放进同一个模块、同一层——一起设计、一起测试、同一个负责人。距离本来就不存在，就别再假装有距离。');
defTerm('显式化','explicitation','把只存在于运行时或环境里的「隐形事实」写回仓库，变成 AI 能直接读到的文本：装配文件、订阅表、golden-file 测试、配置 schema。');
defTerm('契约化|契约','contract','把模块之间的依赖收敛成明确的接口约定：双方只认接口、不看对方实现。只要契约不破，各自内部随便改。');
defTerm('人在环','human-in-the-loop','AI 的产出必须经过人审核才能放行，不能全自动。熵处在中间地带时，这道保险不能省。');
defTerm('平台树','platform tree','把横切能力抽出来后单独长成的一棵树——权限、门控、审计的新家。其他树不再互相纠缠，改为统一依赖它的根。');
defTerm('AI 自由区','AI free zone','语义被上层钉死的叶子区域：AI 在这里可以放手写，写错了有测试拦着，伤不到树根。');
// —— 幽灵根相关 ——
defTerm('DI 容器|依赖注入|DI','Dependency Injection · 依赖注入','对象不自己创建依赖，而是由「容器」在启动时按配置组装。好处是解耦；代价是「接口背后到底是谁」从代码文本里消失，只有运行时知道。');
defTerm('事件总线','event bus','模块之间靠「广播事件」通信：发出去就不管了。谁在监听、按什么顺序处理、处理完还会不会再发新事件——在代码的调用关系里完全看不出来。');
defTerm('订阅表','subscription table','「哪个事件被谁监听」的清单，通常只活在运行时内存里。所谓显式化，就是把它写成仓库里能读到的代码或配置。');
defTerm('golden-file 测试|golden-file','golden file · 基准文件测试','把真实世界的样本（比如用户的旧工程文件）存进仓库当基准，每次改动都必须保证还能正确处理它们——相当于把「图外的旧世界」采样进图内。');
defTerm('schema 化|schema','schema · 结构约定','给配置或数据定一份机器可校验的「说明书」。配置一旦 schema 化，写错会在提交阶段就被发现，而不是上线后爆炸。');
defTerm('部署系统','deployment system','把代码发布到各个环境去运行的设施：环境变量、配置、发布流程都归它管。程序的真实行为常常由它决定，而不是由代码决定。');
defTerm('环境变量','environment variable','程序启动时从运行环境读入的配置，不在代码文本里。同一份代码，在不同环境里可能走完全不同的路径。');
defTerm('注解扫描','annotation scanning','框架启动时扫描代码里的注解标记，自动完成注册与装配。写起来方便，但注册关系从显式代码里消失了——想知道全貌只能问运行时。');
defTerm('内联','inline','把一层间接调用去掉、直接嵌入实现。看似无害的简化——但如果那层「间接」本身是留给别人的扩展点，内联就等于把别人的门焊死。');
defTerm('mock','测试替身','测试里用假对象顶替真实依赖（数据库、网络、容器）。假得太干净时，真实世界的问题也被一起挡在了测试之外——测试全绿，不代表世界没坏。');
defTerm('幻觉','hallucination','AI 在信息不足时编造出看似合理的内容。消歧失败后的修改常常就是这种状态：自信、流畅、但是错的。');
// —— 工程通用名词 ——
defTerm('灰度发布|灰度','canary release','新版本先只放给一小部分用户，观察没问题再逐步放量。期间新旧两个版本同时在线——数据结构也可能同时存在两种形状。');
defTerm('Feature Flag','功能开关','用配置控制某个功能对谁开启。每加一个开关，代码就多一条分支——开与关是两个需要分别验证的平行世界。');
defTerm('门控','gating · 发布控制','控制功能「对谁、什么时候可见」的一整套机制：功能开关、灰度发布、A/B 实验都属于门控。');
defTerm('行级过滤|行级权限','row-level security','权限精确到「每一行数据」：同一张表，不同用户能看到的行不一样。缓存、导出、批处理这类全局能力都必须配合它。');
defTerm('API 鉴权|鉴权','authentication & authorization','确认「你是谁、你能做什么」的检查。API 鉴权就是每个接口调用前的那道门。');
defTerm('脱敏','data masking','展示或导出前隐去敏感字段（比如手机号打码）。它必须发生在数据离开受控边界之前——所以「什么时候序列化」变得性命攸关。');
defTerm('序列化','serialization','把内存里的对象转成可存储、可传输的文本或字节。这是数据「离开程序」的最后一站，也是脱敏等处理的最后关口。');
defTerm('懒加载','lazy loading','等到真正要用的那一刻才去加载或计算。省资源，但「什么时候发生」变得难以预测。');
defTerm('预计算','precompute','提前把结果算好存起来，用时直接取。前提是输入不变——上游（比如角色定义）一变，就得全部作废重算。');
defTerm('TTL','Time To Live · 存活时间','一条缓存的有效期：到期作废、重新计算。TTL 配置放在哪、归谁改，直接决定缓存的真实行为。');
defTerm('缓存键','cache key','缓存查找用的「门牌号」。键里编码了哪些信息，决定哪些请求会共享同一份缓存——键设计错了，会把 A 的数据发给 B。');
defTerm('命中率','hit rate','请求能直接用上缓存的比例。命中率一跌，缓存等于白建，压力全部打回数据库。');
defTerm('连接池','connection pool','预先建好一批数据库连接反复复用，避免每次都重新建连。池子按服务各配各的，服务一多，数据库总连接数就爆了。');
defTerm('埋点','instrumentation','在代码里安插记录用户行为和指标的「探针」，数据用于分析和实验决策。');
defTerm('A/B 实验','A/B testing','把用户随机分成两组，各用一个版本，比数据决定谁留下。实验参数要下发到代码深处，常常得穿透模块边界。');
defTerm('审计','audit','把「谁在什么时候做了什么」逐条记录在案，供事后追查与合规检查。');
defTerm('抽象层','abstraction layer','在调用方和实现之间加的「中间人」，用来隔离变化。每加一层，灵活性多一分，性能和直读性就少一分。');
defTerm('特化','specialization','为特定场景写死的快速路径：跑得快，但失去通用性，场景一变就得重写。');
defTerm('owner','负责人','一段代码明确的责任人：谁设计、谁评审、出了问题谁兜底。共域的核心动作之一，就是让引力对归同一个 owner。');
// —— Blender / VS Code 领域名词 ——
defTerm('插件沙箱|沙箱','sandbox','受限的运行环境：插件在里面只能使用被明确批准的能力，防止越权访问主程序或用户数据。');
defTerm('扩展宿主','extension host','VS Code 专门用来运行插件的独立进程：所有插件都住在里面，插件崩溃也不会拖垮编辑器本体。');
defTerm('扩展点注册','extension point','插件系统里「可以往哪里插东西」的登记处：菜单、命令、面板等挂载点都在这里注册。它与插件 API 是同一套机制的两半。');
defTerm('依赖图','dependency graph','记录「谁的结果依赖谁」的图。Blender 用它决定：你改了一个属性之后，哪些东西需要重算、按什么顺序算。');
defTerm('场景图','scene graph','3D / 文档软件里对象的层级组织：父子关系、变换继承都挂在这棵结构树上。移动父物体、子物体跟着动，就是它在起作用。');
defTerm('修改器栈','modifier stack','Blender 的概念：叠在物体上的一列非破坏性修改，按顺序依次生效，随时可以调序或移除其中一层，原始数据始终保留。');
defTerm('Gizmo','视口操纵器','视口里用来直接拖拽物体的三维手柄——移动箭头、旋转环、缩放块。它显示在哪、操作谁，完全由当前选择集决定。');
defTerm('选择集','selection set','当前被选中的对象集合。几乎所有编辑命令都以它为输入——「这个操作作用在谁身上」的唯一答案。');
defTerm('视口','viewport','实时渲染场景的那块画面。它不是一张独立的图，而是底层数据的投影：数据一变，画面就得跟着重绘。');
defTerm('Undo 栈','undo stack','按顺序记录每一步操作、支撑撤销 / 重做的结构。每个新命令都必须回答「我该怎么撤销自己」——所以它与命令系统互为镜像。');
defTerm('宏录制','macro recording','把用户的一串操作录下来供日后重放。录制品里凡是引用了「当时环境」的东西（比如某个实验分支），重放时可能已经不存在。');
defTerm('非破坏编辑','non-destructive editing','编辑不动原始数据，效果以可叠加、可撤销的「层」存在。代价是对原始数据的引用一直保留着——权限过滤可能因此被绕开。');
defTerm('数据块','datablock','Blender 的数据单元：网格、材质、场景都是数据块，靠唯一 ID 相互引用，引用计数决定谁被保存、谁成「孤儿」被清理——相当于文档模型的户口系统。');
defTerm('驱动器','driver','让一个属性的值由表达式或另一个属性实时驱动——比如用骨骼的旋转驱动嘴巴开合。它在数据模型深处悄悄改值，是依赖图必须理解的「隐形写手」。');
defTerm('版本迁移','schema migration','把旧版本的文件或数据升级成新版结构的转换逻辑。它必须永远认识所有历史版本——文件格式每改一次，它就多背一段历史。');
defTerm('布局持久化','layout persistence','把用户摆好的面板位置、窗口分割存下来，下次打开原样恢复。存在哪、跟什么文件一起存，决定它会和谁纠缠。');

const TERM_RE=(()=>{
  const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const keys=Object.keys(TERMS).sort((a,b)=>b.length-a.length);
  return new RegExp(keys.map(k=>(/^[A-Za-z]/.test(k)?'\\b':'')+esc(k)+(/[A-Za-z]$/.test(k)?'\\b':'')).join('|'),'g');
})();
// 把容器内文本节点里出现的术语包成 .term（悬停出解释）
function annotateTerms(root){
  if(!root)return;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  const texts=[];
  while(walker.nextNode()){
    const nd=walker.currentNode;
    if(nd.parentNode&&nd.parentNode.closest&&nd.parentNode.closest('.term'))continue;
    texts.push(nd);
  }
  for(const nd of texts){
    const s=nd.nodeValue; TERM_RE.lastIndex=0;
    let m,last=0,frag=null;
    while((m=TERM_RE.exec(s))){
      frag=frag||document.createDocumentFragment();
      if(m.index>last)frag.appendChild(document.createTextNode(s.slice(last,m.index)));
      const sp=document.createElement('span');
      sp.className='term'; sp.textContent=m[0];
      frag.appendChild(sp);
      last=m.index+m[0].length;
    }
    if(frag){
      if(last<s.length)frag.appendChild(document.createTextNode(s.slice(last)));
      nd.parentNode.replaceChild(frag,nd);
    }
  }
}

/* ============================== UI ============================== */
const $=id=>document.getElementById(id);
function renderPanel(){
  const s=STAGES[state.stage];
  $('stage-chip').textContent=s.chip;
  $('stage-title').textContent=s.title;
  $('stage-body').innerHTML=s.body;
  $('case-box').style.display=state.stage===3?'block':'none';
  if(state.stage===3)$('case-box').innerHTML='<span class="dim">纠缠正在产生……</span>';
  $('strategies').style.display=state.stage>=7?'block':'none';
  $('prev').style.visibility=state.stage===0?'hidden':'visible';
  $('next').textContent=state.stage===STAGES.length-1?'↺ 回到总览':'下一步 →';
  $('panel').scrollTop=0;
  annotateTerms($('stage-body'));
}
function renderDots(){
  const box=$('dots'); box.innerHTML='';
  DOT_NAMES.forEach((n,i)=>{
    const d=document.createElement('span');
    d.className='dot'+(i===state.stage?' cur':'');
    d.textContent=n;
    d.onclick=()=>setStage(i);
    box.appendChild(d);
  });
}
function renderStrats(){
  const box=$('strat-list'); box.innerHTML='';
  STRATS.forEach(st=>{
    const b=document.createElement('button');
    b.className='strat'+(state.strat[st.k]?' on':'');
    if(state.stage===8)b.setAttribute('disabled','');
    b.innerHTML=`<span class="s-name">${st.name}<em>${st.pct} 熵</em></span><span class="s-desc">${st.desc}</span>`;
    b.onclick=()=>{
      state.strat[st.k]=!state.strat[st.k];
      if(st.k==='layer'){
        if(state.strat.layer)flyCamera(V3(0,36,130),V3(0,10,0),1.6);
        else flyCamera(V3(0,32,72),V3(0,8,-2),1.6);
      }
      applyState(); renderStrats();
    };
    box.appendChild(b);
  });
  annotateTerms(box);
}

/* ============================== 状态应用 ============================== */
let platformWasVisible=false;
function applyState(){
  refreshTangleFlags();
  applyTreePositions();
  const platVis=stratOn('platform');
  if(platVis&&!platformWasVisible){
    platformGroup.visible=true; platformGroup.scale.setScalar(.01);
    tween(.9,k=>platformGroup.scale.setScalar(.01+.99*k));
  }
  platformGroup.visible=platVis;
  platformWasVisible=platVis;
  if(platLabelObj)platLabelObj.visible=platVis;
  gatesGroup.visible=stratOn('layer');
  radar.visible=stratOn('loops');
  rebuildTangles();
  refreshNodes();
  updateEntropy();
}

function cancelTimers(){
  if(revealTimer){clearInterval(revealTimer);revealTimer=null;}
  if(cycleTimer){clearInterval(cycleTimer);cycleTimer=null;}
  highlightTangle=-1;
}

function setStage(n){
  cancelTimers();
  state.stage=n;
  // 手术开关 = 当前步骤的纯函数：仅第 8 步（终态）全开，其余步骤（含刚进入的第 7 步）一律清零。
  // 于是无论从哪个方向进入某一步，其状态都可复现——从第 8 步 ← 退回第 7 步会回到干净的可操作起点，
  // 不会残留「全开」，避免「进入后续状态后就退不回之前状态」的单向性。
  Object.keys(state.strat).forEach(k=>state.strat[k]=(n===8));
  state.revealed=n===3?0:TANGLES.length;
  renderPanel(); renderDots(); renderStrats();
  $('vignette').classList.toggle('danger',n===6);
  controls.autoRotate=(n===0);

  // 引力强度随阶段推进（总览预告 + 引力阶段之后常驻）
  const gTarget=(n===0||n>=4)?1:0;
  if(Math.abs(gTarget-gravityPull)>.01){
    const g0=gravityPull;
    tween(1.6,k=>{gravityPull=g0+(gTarget-g0)*k;linkDirty=true;},()=>{linkDirty=true;refreshNodes();});
  }

  if(n===6){
    applyState(); buildCollapse();
    const fp=nodesById.get(FOCUS_ID).mesh.getWorldPosition(new THREE.Vector3());
    flyCamera(fp.clone().add(V3(10,8,17)),fp.clone().add(V3(-1,4,2)),1.8);
  }else{
    clearCollapse(); applyState();
    const c=STAGES[n].cam;
    flyCamera(V3(...c[0]),V3(...c[1]),1.7);
  }

  if(n===3){ // 逐条揭示偶然交织
    revealTimer=setInterval(()=>{
      state.revealed++;
      const t=TANGLES[state.revealed-1];
      $('case-box').innerHTML=`<b>案例 ${state.revealed}/${TANGLES.length}</b>　${t.aName} ↔ ${t.bName}<br>${t.why}`;
      annotateTerms($('case-box'));
      highlightTangle=state.revealed-1;
      refreshTangleFlags(); rebuildTangles(); refreshNodes(); updateEntropy();
      if(state.revealed>=TANGLES.length){
        clearInterval(revealTimer); revealTimer=null;
        let ci=0;
        cycleTimer=setInterval(()=>{
          ci=(ci+1)%TANGLES.length;
          const t2=TANGLES[ci]; highlightTangle=ci;
          $('case-box').innerHTML=`<b>案例 ${ci+1}/${TANGLES.length}</b>　${t2.aName} ↔ ${t2.bName}<br>${t2.why}`;
          annotateTerms($('case-box'));
        },4500);
      }
    },800);
  }
}

$('next').onclick=()=>setStage((state.stage+1)%STAGES.length);
$('prev').onclick=()=>setStage(Math.max(0,state.stage-1));
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')setStage((state.stage+1)%STAGES.length);
  if(e.key==='ArrowLeft')setStage(Math.max(0,state.stage-1));
});

/* ============================== 悬停 ============================== */
const raycaster=new THREE.Raycaster();
raycaster.params.Line.threshold=1.0;
const pointer=new THREE.Vector2(-2,-2); // 初始在视锥外：鼠标未动时不凭空触发悬停
const tooltip=$('tooltip');
let hovered=null;
let overUI=false;
addEventListener('pointermove',e=>{
  pointer.x=(e.clientX/innerWidth)*2-1;
  pointer.y=-(e.clientY/innerHeight)*2+1;
  overUI=!!(e.target&&e.target.closest&&e.target.closest('#panel,#topbar,#meter,#legend,#dots'));
  tooltip.style.left=Math.min(e.clientX+16,innerWidth-350)+'px';
  tooltip.style.top=Math.min(e.clientY+16,innerHeight-200)+'px';
});
// 名词解释：悬停带虚线下划线的词条
let termEl=null;
addEventListener('mouseover',e=>{
  const el=e.target&&e.target.closest?e.target.closest('.term'):null;
  if(el===termEl)return;
  termEl=el;
  if(el&&TERMS[el.textContent]){
    const info=TERMS[el.textContent];
    tooltip.innerHTML=`<b>${el.textContent}</b><span class="tt-kind">${info.en||'名词解释'}</span><div class="tt-desc">${info.d}</div>`;
    tooltip.style.display='block';
  }else if(!el){
    tooltip.style.display='none';
  }
});
function nodeTooltip(n){
  const kind=n.level===0?'SSOT · 由人守护':(n.hasChildren?'骨架 · 谨慎交给 AI':'叶子 · AI 自由区（需测试锚定）');
  const treeName=n.tree>=0?trees[n.tree].def.name:'平台树';
  const revealed=n.tangles.filter(t=>t.revealedNow);
  let h=`<b>${n.name}</b><span class="tt-kind">${treeName} · ${kind}</span>`;
  h+=`<div class="tt-mean">含义数：${1+revealed.length}${revealed.length?'（多义！）':'（单义 ✓）'}</div>`;
  if(revealed.length){
    h+='<ul>'+revealed.map(t=>{
      const other=t.aNode===n?t.bName:t.aName;
      return `<li><b>与「${other}」交织</b>：${t.why}</li>`;
    }).join('')+'</ul>';
  }
  if(n.gravity&&gravityPull>.4){
    const other=n.gravity.na===n?n.gravity.bName:n.gravity.aName;
    h+=`<div class="tt-grav">⚡ 本征耦合：与「${other}」势必靠近</div><ul><li>${n.gravity.why}</li></ul>`;
  }
  if(n.ghost&&state.stage>=5){
    h+=`<div class="tt-ghost">👻 真相在图外：由「${n.ghost.n}」决定——AI 从文本读不到</div>`;
  }
  return h;
}
function tangleTooltip(t){
  let mode='<span style="color:#ff4d6d">● 纠缠中</span>';
  if(stratOn('platform'))mode='<span style="color:#ffd166">● 已平台化：双方只依赖平台服务</span>';
  else if(stratOn('layer'))mode='<span style="color:#ffb84d">● 已契约化：必须穿过层间接口</span>';
  else if(t.resolvedByLoops)mode='<span style="color:#9ad1b6">● 本轮循环中已消解</span>';
  return `<b>${t.aName} ↔ ${t.bName}</b><div style="margin:3px 0">${t.why}</div>${mode}`;
}
function gravityTooltip(g){
  const mode=stratOn('fusion')
    ?'<span style="color:#ffd166">● 已共域：同一模块、一起设计、一个 owner</span>'
    :'<span style="color:#ff2fd0">● 本征耦合 —— 拆不开，只能共域</span>';
  return `<b>${g.aName} ⚡ ${g.bName}</b><div style="margin:3px 0">${g.why}</div>${mode}`;
}
function ghostTooltip(g){
  const mode=stratOn('explicit')
    ?'<span style="color:#ffd166">● 已收编：真相已显式化入库（装配文件 / 订阅表 / golden-file / schema）</span>'
    :'<span style="color:#7de8ff">● 游离在图外 —— AI 从文本静态读不到它</span>';
  return `<b>👻 ${g.n}</b><div style="margin:3px 0">${g.why}</div><div style="margin:3px 0;color:#93a0b8"><b style="color:#dfe6f3">出路</b>：${g.fix}</div>${mode}`;
}
function doHover(){
  if(overUI){ // 鼠标在 UI 面板上：3D 悬停让位给名词解释
    if(hovered){
      const n=hovered.userData.node;
      if(n&&n.mat)n.mat.emissiveIntensity=.38;
      hovered=null;
      if(!termEl)tooltip.style.display='none';
    }
    return;
  }
  raycaster.setFromCamera(pointer,camera);
  const nodeMeshes=allNodes.map(n=>n.mesh).concat(Object.values(platNodes));
  const beamsG=GRAVITY.map(g=>g.beam).filter(b=>b.visible);
  const ghostHit=[];
  for(const g of GHOSTS)if(g.wire.visible){
    ghostHit.push(g.wire,g.inner);
    for(const l of g.dashed)if(l.visible)ghostHit.push(l);
    for(const l of g.solid)if(l.visible)ghostHit.push(l);
  }
  const hits=raycaster.intersectObjects(nodeMeshes.concat(rayTubes,beamsG,ghostHit),false);
  let target=null;
  if(hits.length)target=hits[0].object;
  if(hovered&&hovered!==target){
    const n=hovered.userData.node;
    if(n&&n.mat)n.mat.emissiveIntensity=.38;
    hovered=null; if(!termEl)tooltip.style.display='none';
  }
  if(target&&target!==hovered){
    hovered=target;
    const n=target.userData.node, t=target.userData.tangle, gv=target.userData.gravity, gh=target.userData.ghost;
    if(n){
      if(n.mat)n.mat.emissiveIntensity=1.0;
      tooltip.innerHTML=n.platform
        ?`<b>${n.name}</b><span class="tt-kind">平台树 · 横切关注点的显式归属</span>`
        :nodeTooltip(n);
      tooltip.style.display='block';
    }else if(t){
      tooltip.innerHTML=tangleTooltip(t);
      tooltip.style.display='block';
    }else if(gv){
      tooltip.innerHTML=gravityTooltip(gv);
      tooltip.style.display='block';
    }else if(gh){
      tooltip.innerHTML=ghostTooltip(gh);
      tooltip.style.display='block';
    }
  }
}

/* ============================== 主循环 ============================== */
const clock=new THREE.Clock();
let frame=0;
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  stepTweens();
  updateGravity(t);
  updateGhosts(t);
  if(linkDirty){rebuildTangles();linkDirty=false;}
  controls.update();

  for(const s of spinners)s.obj.rotateOnAxis(s.axis,s.speed*.016);

  // SDD 脉冲（端点实时读取，跟随引力形变）
  const sdd=stratOn('sdd');
  for(const p of pulses){
    p.dot.visible=sdd;
    if(sdd){
      const k=(t*.3+p.phase)%1;
      p.dot.position.lerpVectors(p.e.na.mesh.position,p.e.nb.mesh.position,k);
      p.dot.material.opacity=.9*Math.sin(k*Math.PI);
    }
  }
  for(const r of rootRings)if(r.visible){const s=1+.18*Math.sin(t*2.4);r.scale.setScalar(s);}

  if(radar.visible)radar.rotation.z=t*.5;

  if(aiGroup.visible){
    for(const b of beams)if(b.userData.flicker)
      b.material.opacity=.2+.4*Math.abs(Math.sin(t*4+b.userData.ph));
    if(focusRing){
      const s=1+.25*Math.sin(t*3);
      focusRing.scale.setScalar(s);
      focusRing.lookAt(camera.position);
    }
    if(orb)orb.position.y+=Math.sin(t*1.2)*.006;
  }

  if(state.stage===3&&highlightTangle>=0){
    TANGLES.forEach((tg,i)=>{
      for(const m of tg.meshes)
        m.material.opacity=i===highlightTangle?.75+.25*Math.sin(t*5):.5;
    });
  }

  if(frame%2===0)doHover();
  paintEntropy();
  frame++;
  renderer.render(scene,camera);
  css2d.render(scene,camera);
}

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  css2d.setSize(innerWidth,innerHeight);
});

/* ============================== 启动 ============================== */
setStage(0);
annotateTerms(document.getElementById('legend'));
annotateTerms(document.getElementById('meter'));
animate();
window.__booted=true;
clearTimeout(window.__bootTimer);
document.getElementById('boot').remove();
</script>
