name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 验证 + 构建:静态校验 → 源码版冒烟(无头 Chrome 走完 10 步叙事)→
  # 构建单文件版(不入库,CI 现场生成)→ 对构建产物再冒烟 → 打包站点。
  # 任何一步失败都不会部署;冒烟截图会作为 artifact 上传,便于失败时排查。
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static check (esbuild)
        run: pnpm run check

      - name: Smoke test (source, headless Chrome)
        run: pnpm run smoke

      - name: Build embedded single-file version
        run: pnpm run build

      - name: Smoke test (embedded, file://)
        run: pnpm run smoke:embedded

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-screenshots
          path: test-artifacts/
          retention-days: 14

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html index-embedded.html _site/
          cp -R src styles vendor _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
