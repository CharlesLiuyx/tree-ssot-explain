<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多树形结构 · 节点交织模型</title>
<!--
  轻壳:页面只保留启动提示与危险光晕两个前置元素。
  样式按组件拆在 styles/,数据·故事·场景·UI·编排拆在 src/(入口 src/main.js,UI 组件自行挂载 DOM)。
  修改后运行 node build-embedded.mjs 重新生成单文件版 index-embedded.html。
-->
<style>
/* === styles/base.css === */
/* 基础:主题变量 / 全局排版 / 启动提示 / 危险光晕 / 通用文本色助手 */
/* 性能注:面板不用 backdrop-filter——毛玻璃背后是每帧都在变的 WebGL 画布,
   每个模糊面板都会逼合成器每帧重新采样+高斯模糊一大块屏幕;换成更实的底色,观感几乎不变。 */
:root{
  --gold:#ffd166; --red:#ff4d6d; --green:#5dd39e; --amber:#ffb84d; --mg:#ff2fd0; --ghost:#7de8ff;
  --txt:#dfe6f3; --sub:#93a0b8; --card:rgba(13,17,26,.93); --line:rgba(255,255,255,.09);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(1200px 800px at 50% 30%,#141b2a 0%,#0a0e16 55%,#06080d 100%);
  color:var(--txt);font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,-apple-system,sans-serif;font-size:14px}
canvas{display:block}
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sub);z-index:99;
  background:rgba(6,8,13,.7);font-size:15px;letter-spacing:.05em;text-align:center;padding:0 40px;line-height:1.8}
/* 危险光晕:两层固定 box-shadow 只画一次,呼吸动画只动 opacity(纯合成器,无逐帧重绘) */
#vignette{position:fixed;inset:0;pointer-events:none;z-index:5}
#vignette::before,#vignette::after{content:"";position:absolute;inset:0;opacity:0;transition:opacity .8s}
#vignette::before{box-shadow:inset 0 0 200px rgba(255,60,90,.30)}
#vignette::after{box-shadow:inset 0 0 260px rgba(255,60,90,.45)}
#vignette.danger::before{opacity:1}
#vignette.danger::after{animation:vpulse 1.6s ease-in-out infinite}
@keyframes vpulse{0%,100%{opacity:0}50%{opacity:1}}

/* 面板/案例/统计通用的文本色助手 */
.g{color:var(--gold);font-weight:600}.r{color:var(--red);font-weight:600}
.gr{color:var(--green);font-weight:600}.am{color:var(--amber);font-weight:600}
.mg{color:var(--mg);font-weight:600}.gh{color:var(--ghost);font-weight:600}
.dim{color:var(--sub)}

/* 快捷键角标(返回按钮 / 全景 / 旋转开关共用) */
#vp-back .kbd,#vp-map .kbd,#rotate-toggle .kbd{font-size:10px;color:var(--sub);border:1px solid var(--line);border-radius:5px;padding:1px 5px}

/* === styles/topbar.css === */
/* 顶栏:标题 + 快捷键提示 */
#topbar{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:14px 22px;display:flex;justify-content:space-between;align-items:baseline;
  background:linear-gradient(180deg,rgba(6,8,13,.85),transparent)}
#topbar h1{margin:0;font-size:17px;font-weight:700;letter-spacing:.06em}
#topbar h1 em{font-style:normal;color:var(--gold)}
#topbar .sub{color:var(--sub);font-size:12px;margin-top:2px}
#topbar .keys{color:var(--sub);font-size:12px}
#topbar .keys b{color:var(--txt);font-weight:600}

/* === styles/panel.css === */
/* 叙事面板:步骤文案 / 案例栏 / 策略开关 / 统计 / 上下步导航 */
#panel{position:fixed;left:18px;top:72px;z-index:10;width:408px;max-height:calc(100vh - 170px);
  overflow-y:auto;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:16px 18px 14px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
#panel::-webkit-scrollbar{width:6px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
#stage-chip{display:inline-block;font-size:11px;letter-spacing:.18em;color:var(--gold);
  border:1px solid rgba(255,209,102,.4);border-radius:99px;padding:2px 10px;margin-bottom:8px}
#stage-title{margin:0 0 8px;font-size:19px;font-weight:700;line-height:1.35}
#stage-body{color:var(--txt);line-height:1.8;font-size:13.5px}
#stage-body p{margin:.5em 0}
#stage-body ul{margin:.4em 0;padding-left:1.2em}
#stage-body li{margin:.3em 0}
.hint{margin-top:10px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.05);
  color:var(--sub);font-size:12.5px;line-height:1.6}
.hint b{color:var(--txt)}
.formula{margin:10px 0;padding:12px;border-radius:10px;text-align:center;font-size:14.5px;font-weight:600;
  background:linear-gradient(135deg,rgba(255,209,102,.12),rgba(255,209,102,.04));border:1px solid rgba(255,209,102,.35)}
.quote{margin-top:10px;padding:10px 12px;border-left:3px solid var(--gold);background:rgba(255,255,255,.04);
  border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.75}

#case-box{display:none;margin-top:10px;padding:10px 12px;border-left:3px solid var(--red);
  background:rgba(255,77,109,.08);border-radius:0 8px 8px 0;font-size:12.8px;line-height:1.7;min-height:64px}
#case-box b{color:var(--red)}

#strategies{display:none;margin-top:12px}
.strat{display:block;width:100%;text-align:left;margin:6px 0;padding:9px 12px;border-radius:10px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--txt);font-family:inherit;transition:all .25s}
.strat:hover{border-color:rgba(255,209,102,.5)}
.strat.on{background:linear-gradient(135deg,rgba(255,209,102,.16),rgba(255,209,102,.05));border-color:var(--gold)}
.strat .s-name{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700}
.strat .s-name em{font-style:normal;color:var(--green);font-weight:700}
.strat.on .s-name::before{content:"✓ ";color:var(--gold)}
.strat .s-desc{display:block;margin-top:3px;color:var(--sub);font-size:12px;line-height:1.6}
.strat .s-desc b{color:var(--mg)}
.strat .s-desc i{font-style:normal;color:var(--ghost)}
.strat[disabled]{pointer-events:none;opacity:.9}
#tangle-stats{margin-top:8px;font-size:12.5px;color:var(--sub);line-height:1.7}

#nav{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
#nav button{cursor:pointer;border:none;border-radius:9px;padding:8px 16px;font-family:inherit;font-size:13.5px;font-weight:600}
#prev{background:rgba(255,255,255,.08);color:var(--txt)}
#prev:hover{background:rgba(255,255,255,.14)}
#next{background:var(--gold);color:#1a1408;flex:1}
#next:hover{filter:brightness(1.1)}

@media (max-width:980px){
  #panel{width:min(86vw,408px)}
}

/* === styles/hud.css === */
/* HUD:语义熵仪表 / 图例 / 底部步骤导航点 / 自动旋转开关 */
#meter{position:fixed;right:18px;top:72px;z-index:10;width:252px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
#meter .m-title{font-size:12px;color:var(--sub);letter-spacing:.1em}
#meter .m-row{display:flex;align-items:baseline;gap:8px;margin:2px 0 8px}
#entropy-val{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums}
#entropy-zone{font-size:12.5px;font-weight:700}
#meter .bar{height:9px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
#meter .bar i{position:absolute;top:-2px;bottom:-2px;width:1px;background:rgba(255,255,255,.25)}
#entropy-fill{height:100%;width:0%;border-radius:99px;transition:background .5s}
#meter .zones{display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;color:var(--sub)}
.z-ok{color:var(--green)} .z-mid{color:var(--amber)} .z-bad{color:var(--red)}

#legend{position:fixed;right:18px;bottom:16px;z-index:10;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:11.5px;color:var(--sub);line-height:1.9}
#legend .sw{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:6px;vertical-align:baseline}

#dots{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;
  background:var(--card);border:1px solid var(--line);border-radius:99px;padding:8px 12px}
.dot{cursor:pointer;color:var(--sub);font-size:12px;padding:3px 8px;border-radius:99px;transition:all .2s;white-space:nowrap}
.dot:hover{color:var(--txt)}
.dot.cur{background:rgba(255,209,102,.18);color:var(--gold);font-weight:700}

#rotate-toggle{position:fixed;left:18px;bottom:16px;z-index:10;display:none;align-items:center;gap:7px;
  cursor:pointer;background:var(--card);
  border:1px solid var(--line);border-radius:99px;padding:8px 15px;color:var(--txt);
  font-family:inherit;font-size:12.5px;font-weight:600;letter-spacing:.02em;
  box-shadow:0 12px 40px rgba(0,0,0,.45);transition:border-color .2s,color .2s}
#rotate-toggle:hover{border-color:rgba(255,209,102,.5)}
#rotate-toggle .rt-ico{font-size:12px;line-height:1}
#rotate-toggle.paused{color:var(--gold);border-color:rgba(255,209,102,.5)}

@media (max-width:980px){
  #meter{width:200px}
  #dots{max-width:92vw;overflow-x:auto}
}

/* === styles/tooltip.css === */
/* 悬停提示:3D 对象详情 + 名词解释(.term 虚线下划线词条)。
   left/top 锚定在 0,跟随指针只写 transform(合成器合成,不触发重排) */
#tooltip{position:fixed;left:0;top:0;z-index:20;pointer-events:none;display:none;max-width:330px;will-change:transform;
  background:rgba(10,13,20,.94);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 12px;
  font-size:12.5px;line-height:1.65;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#tooltip b{font-size:13.5px}
#tooltip .tt-kind{display:block;color:var(--sub);font-size:11.5px;margin:1px 0 4px}
#tooltip .tt-mean{color:var(--amber);font-weight:600;margin-bottom:2px}
#tooltip .tt-grav{color:var(--mg);font-weight:600;margin-top:4px}
#tooltip .tt-ghost{color:var(--ghost);font-weight:600;margin-top:4px}
#tooltip ul{margin:2px 0 0;padding-left:1.1em;color:var(--sub)}
#tooltip li{margin:2px 0}
#tooltip li b{color:var(--txt);font-size:12.5px}
#tooltip .tt-desc{color:var(--txt);margin-top:2px}

.term{border-bottom:1px dotted rgba(223,230,243,.45);cursor:help}
.term:hover{border-bottom-style:solid;border-bottom-color:var(--gold)}

/* === styles/labels.css === */
/* 3D 场景内的 CSS2D 标签:树标签 / 平台树 / AI 球 / 幽灵根 / 树之树元节点 */
.tlabel{pointer-events:none;text-align:center;color:var(--txt);text-shadow:0 2px 8px rgba(0,0,0,.9);transition:opacity .5s}
.tlabel b{display:block;font-size:14px;letter-spacing:.05em}
.tlabel .ssot{display:block;font-size:10.5px;color:var(--gold);letter-spacing:.12em}
.tlabel i{display:none;font-style:normal;font-size:11px;color:var(--sub);line-height:1.5;margin-top:3px;max-width:220px}
.tlabel.full i{display:block}
.tlabel.ghost{opacity:.12}
.plabel b{color:#f3e9c8}
.ailabel{pointer-events:none;text-align:center;color:#cfe0ff;text-shadow:0 2px 8px rgba(0,0,0,.9);font-size:12.5px;font-weight:700}
.ailabel span{display:block;font-size:10.5px;color:var(--sub);font-weight:400}
.glabel{pointer-events:none;text-align:center;color:var(--ghost);text-shadow:0 2px 8px rgba(0,0,0,.9);font-size:12px;font-weight:600}
.glabel b{display:block;font-size:12.5px}
.glabel span{display:block;font-size:10px;color:var(--sub);font-weight:400}
.mlabel{pointer-events:none;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.9);font-size:12.5px;font-weight:700;white-space:nowrap}
.mlabel .seq{display:inline-block;min-width:17px;padding:0 4px;border-radius:99px;background:rgba(255,209,102,.92);color:#1a1408;font-size:10.5px;margin-right:4px;font-weight:800}
.mlabel .mroot{display:block;font-size:10px;color:var(--gold);font-weight:600;letter-spacing:.08em;margin-top:1px}

/* === styles/viewport.css === */
/* 点击 Zoom in · 视口树形历史:返回按钮 / 胶囊 / 历史面板 / 节点详情 / 全景 overlay */
#vp-back{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:12;display:none;align-items:center;gap:7px;
  cursor:pointer;background:var(--card);
  border:1px solid rgba(255,209,102,.5);border-radius:99px;padding:7px 15px;color:var(--gold);
  font-family:inherit;font-size:12.5px;font-weight:600;letter-spacing:.02em;
  box-shadow:0 12px 40px rgba(0,0,0,.45);transition:filter .15s,transform .08s}
#vp-back:hover{filter:brightness(1.15)}
#vp-back:active{transform:translateX(-50%) scale(.95)}

#vp-pill{position:fixed;right:18px;top:188px;z-index:10;display:none;align-items:center;gap:7px;
  cursor:pointer;background:var(--card);
  border:1px solid var(--line);border-radius:99px;padding:8px 14px;color:var(--txt);
  font-family:inherit;font-size:12.5px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.45);transition:border-color .2s}
#vp-pill:hover{border-color:rgba(255,209,102,.5)}
#vp-pill .n{font-size:10.5px;color:var(--gold);border:1px solid rgba(255,209,102,.35);border-radius:99px;padding:1px 7px}

#vp-panel{position:fixed;right:18px;top:188px;z-index:10;width:252px;display:none;
  max-height:calc(100vh - 372px);overflow-y:auto;
  background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
#vp-panel::-webkit-scrollbar{width:6px}
#vp-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
#vp-panel .vp-head{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:7px}
#vp-panel .vp-head .vp-title{font-size:11px;color:var(--sub);letter-spacing:.14em;white-space:nowrap}
#vp-panel .vp-acts{display:flex;gap:5px;margin-bottom:9px}
#vp-panel .vp-act{cursor:pointer;font-size:11.5px;color:var(--gold);border:1px solid rgba(255,209,102,.35);
  border-radius:99px;padding:2px 9px;transition:filter .15s;white-space:nowrap}
#vp-panel .vp-act:hover{filter:brightness(1.2)}

#vp-detail{border-radius:9px;background:rgba(255,255,255,.045);border:1px solid var(--line);padding:9px 11px;
  font-size:12.5px;line-height:1.62;margin-bottom:10px}
#vp-detail b{font-size:13.5px}
#vp-detail .tt-kind{display:block;color:var(--sub);font-size:11px;margin:2px 0 5px}
#vp-detail .tt-mean{color:var(--amber);font-weight:600;margin-bottom:2px}
#vp-detail .tt-grav{color:var(--mg);font-weight:600;margin-top:4px}
#vp-detail .tt-ghost{color:var(--ghost);font-weight:600;margin-top:4px}
#vp-detail ul{margin:2px 0 0;padding-left:1.1em;color:var(--sub)}
#vp-detail li{margin:2px 0}
#vp-detail li b{color:var(--txt);font-size:12px}
#vp-detail .vp-empty{color:var(--sub);text-align:center;padding:3px 0}
#vp-detail .vp-empty b{color:var(--gold)}

#vp-tree{font-size:12px}
#vp-panel .vp-sub{font-size:10.5px;color:var(--sub);letter-spacing:.1em;margin:0 0 4px 2px}
.vp-row{position:relative;display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:7px;cursor:pointer;
  color:var(--sub);white-space:nowrap;overflow:hidden;transition:background .12s,color .12s}
.vp-row:hover{background:rgba(255,255,255,.06);color:var(--txt)}
.vp-row .vp-dot{flex:0 0 auto;width:7px;height:7px;border-radius:99px;background:currentColor;opacity:.55}
.vp-row .vp-name{overflow:hidden;text-overflow:ellipsis}
.vp-row.cur{background:rgba(255,209,102,.14);color:var(--gold);font-weight:700}
.vp-row.cur .vp-dot{opacity:1;box-shadow:0 0 8px currentColor}

/* ===== 视口历史 · 全景总览(V 键 / ⛶ 按钮)===== */
#vp-map{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
  background:rgba(4,6,11,.85)} /* 无毛玻璃(省每帧全屏模糊),用更深的遮罩保持模态分离感 */
#vp-map.open{display:flex}
#vp-map .vpm-card{width:min(780px,92vw);max-height:80vh;display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.6);overflow:hidden}
#vp-map .vpm-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
#vp-map .vpm-title{font-size:13px;font-weight:700;letter-spacing:.08em;white-space:nowrap}
#vp-map .vpm-stats{flex:1;font-size:11.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#vp-map .vpm-close{cursor:pointer;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:99px;
  color:var(--txt);font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;display:inline-flex;align-items:center;gap:6px}
#vp-map .vpm-close:hover{background:rgba(255,255,255,.13)}
#vp-map .vpm-body{overflow:auto;padding:14px 18px}
#vp-map .vpm-body::-webkit-scrollbar{width:6px;height:6px}
#vp-map .vpm-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:3px}
#vp-map .vpm-empty{color:var(--sub);font-size:12.5px;padding:6px 2px}
#vp-map .vpm-foot{padding:10px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--sub);line-height:1.6}
.vpm-tree,.vpm-tree ul{list-style:none;margin:0;padding:0}
.vpm-tree ul{padding-left:30px;position:relative}
.vpm-tree ul::before{content:"";position:absolute;left:12px;top:-4px;bottom:14px;border-left:1px solid rgba(255,255,255,.15)}
.vpm-tree li{position:relative;margin:7px 0}
.vpm-tree ul li::before{content:"";position:absolute;left:-18px;top:13px;width:15px;border-top:1px solid rgba(255,255,255,.15)}
.vpm-chip{display:inline-flex;align-items:center;gap:8px;max-width:100%;cursor:pointer;
  background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:9px;color:var(--txt);
  font-family:inherit;font-size:12.5px;padding:5px 11px;transition:border-color .12s,background .12s}
.vpm-chip:hover{border-color:rgba(255,209,102,.55);background:rgba(255,209,102,.07)}
.vpm-chip .dot{flex:0 0 auto;width:8px;height:8px;border-radius:99px}
.vpm-chip .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vpm-chip .idx{color:var(--sub);font-size:10px}
.vpm-chip.onpath{border-color:rgba(255,209,102,.4)}
.vpm-chip.cur{background:rgba(255,209,102,.15);border-color:var(--gold);color:var(--gold);font-weight:700}
.vpm-chip .badge{font-size:10px;background:var(--gold);color:#1a1408;border-radius:99px;padding:1px 7px;font-weight:700}
</style>
</head>
<body>
<div id="boot">正在启动 3D 引擎…</div>
<div id="vignette"></div>

<script>
window.__bootTimer=setTimeout(function(){
  var b=document.getElementById('boot');
  if(b&&!window.__booted){b.textContent='3D 引擎启动失败 —— 请换用现代浏览器（Chrome / Edge / Safari 最新版）';}
},9000);
window.addEventListener('error',function(e){
  (window.__errs=window.__errs||[]).push((e.message||'资源加载失败')+' @ '+(e.filename||'')+':'+(e.lineno||''));
  var b=document.getElementById('boot');
  if(b&&!window.__booted){b.textContent='3D 引擎加载出错：'+(e.message||'资源加载失败')+' —— 请检查后刷新';clearTimeout(window.__bootTimer);}
},true);
window.addEventListener('unhandledrejection',function(e){
  (window.__errs=window.__errs||[]).push('Promise: '+(e.reason&&e.reason.message||e.reason));
});
</script>

<script>
